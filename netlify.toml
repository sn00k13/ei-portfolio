[build]
  command = "node build.js"
  publish = "."

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/"
  to = "/eric-uzoukwu-FINAL.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
