<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Back Soon — Uzoukwu Eric Ikenna</title>
<meta name="robots" content="noindex"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080a0d;--bg2:#0d1117;--gold:#c9a84c;--text:#eceae4;--muted:rgba(236,234,228,.45);--mono:'Courier New',monospace;--serif:Georgia,serif;--border:rgba(255,255,255,.07)}
body{background:var(--bg);color:var(--text);font-family:var(--serif);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;position:relative;overflow:hidden}
/* Subtle grid */
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:80px 80px;pointer-events:none}
/* Gold bars */
.bar-top{position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),#e8c96a,var(--gold))}
.bar-bot{position:fixed;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),#e8c96a,var(--gold))}
.wrap{position:relative;z-index:1;max-width:580px}
.eyebrow{font-family:var(--mono);font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:1.5rem;opacity:.9}
.name{font-family:var(--serif);font-size:clamp(2rem,6vw,3.2rem);font-weight:700;line-height:1.1;margin-bottom:.5rem}
.rule{width:60px;height:2px;background:var(--gold);margin:1.5rem auto;opacity:.6}
.headline{font-family:var(--serif);font-size:clamp(1.1rem,3vw,1.4rem);font-weight:400;color:var(--muted);line-height:1.7;margin-bottom:2rem}
.headline em{color:var(--gold);font-style:normal}
.sub{font-family:var(--mono);font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(236,234,228,.35);margin-bottom:2.5rem}
.links{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:3rem}
.link{font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;padding:.45rem 1rem;border:1px solid var(--border);transition:all .2s}
.link:hover{border-color:var(--gold);color:var(--gold)}
.email{font-family:var(--mono);font-size:.72rem;color:var(--gold);text-decoration:none;letter-spacing:.05em;border-bottom:1px solid rgba(201,168,76,.3);padding-bottom:.15rem;transition:opacity .2s}
.email:hover{opacity:.7}
.dots{display:flex;gap:.5rem;justify-content:center;margin-top:3rem}
.dot{width:6px;height:6px;border-radius:50%;background:var(--gold);opacity:.25;animation:pulse 1.8s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.3s}
.dot:nth-child(3){animation-delay:.6s}
@keyframes pulse{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:.8;transform:scale(1.3)}}
/* Decorative circles */
.circle{position:fixed;border-radius:50%;border:1px solid rgba(201,168,76,.06);pointer-events:none}
.c1{width:600px;height:600px;bottom:-200px;right:-150px}
.c2{width:400px;height:400px;top:-100px;left:-100px}
@media(max-width:480px){.links{flex-direction:column;align-items:center}.link{width:200px;text-align:center}}
</style>
</head>
<body>
<div class="bar-top"></div>
<div class="circle c1"></div>
<div class="circle c2"></div>

<div class="wrap">
  <div class="eyebrow">Uzoukwu Eric Ikenna</div>
  <h1 class="name">Back very soon.</h1>
  <div class="rule"></div>
  <p class="headline">
    The site is undergoing a quick update.<br/>
    Something <em>better</em> is on the way.
  </p>
  <p class="sub">Estimated downtime &mdash; a few hours</p>

  <div class="links">
    <a href="https://linkedin.com/in/uzoukwu-eric-ikenna" target="_blank" rel="noopener" class="link">LinkedIn</a>
    <a href="https://linktr.ee/uzoukwuericiyke" target="_blank" rel="noopener" class="link">Linktree</a>
    <a href="https://github.com/UzoukwuEricIyke" target="_blank" rel="noopener" class="link">GitHub</a>
    <a href="https://calendly.com/uzoukwuericiyke" target="_blank" rel="noopener" class="link">Book a Call</a>
  </div>

  <a href="mailto:uzoukwuericiyke@yahoo.com" class="email">uzoukwuericiyke@yahoo.com</a>

  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<div class="bar-bot"></div>
</body>
</html>
