[build]
  base = "apps/admin"
  publish = ".next"
  command = "pnpm --filter @eui/db run generate && pnpm --filter @eui/admin run build"

[build.environment]
  # pnpm is pinned to 11.13.1 via the root package.json "packageManager"
  # field, which requires Node >=22.13 — Netlify's corepack-fetched pnpm
  # fails to even start (ERR_UNKNOWN_BUILTIN_MODULE: node:sqlite) on Node 20.
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Prisma's WASM query compiler (engineType = "client") is loaded via a
# computed runtime path — Netlify's function bundler's static-import
# analysis doesn't reliably pick it up. Force-include it explicitly rather
# than rely on it working by chance for this app's particular route set.
[functions]
  included_files = ["../../packages/db/generated/client/*.wasm"]

# The admin dashboard should never be indexed.
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
