[build]
  base = "apps/web"
  publish = ".next"
  # When Prisma's bundled client can't find schema.prisma next to its own
  # __dirname (guaranteed once any bundler relocates the code), it falls
  # back to checking process.cwd()/generated/client/schema.prisma — that's
  # Prisma's own documented mechanism for exactly this scenario, not
  # something we're working around. process.cwd() for the deployed
  # function is this app's own directory, so copy the real generated
  # client there so that fallback lookup actually finds something.
  command = "pnpm --filter @eui/db run generate && mkdir -p generated/client && cp -r ../../packages/db/generated/client/. generated/client/ && pnpm --filter @eui/web run build"

[build.environment]
  # pnpm is pinned to 11.13.1 via the root package.json "packageManager"
  # field, which requires Node >=22.13 — Netlify's corepack-fetched pnpm
  # fails to even start (ERR_UNKNOWN_BUILTIN_MODULE: node:sqlite) on Node 20.
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Netlify's function packager only auto-includes known Next.js build
# artifacts (.next, node_modules, etc.) — a loose sibling generated/
# folder existing on the build machine after the build command runs is
# not enough to make it into the deployed zip. Say so explicitly, using a
# path local to this base directory (no ../.. traversal, which may not
# survive being packed into a zip entry).
[functions]
  included_files = ["generated/client/*.wasm"]
