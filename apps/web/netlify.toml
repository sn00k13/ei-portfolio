[build]
  base = "apps/web"
  publish = ".next"
  command = "pnpm --filter @eui/db run generate && pnpm --filter @eui/web run build"

[build.environment]
  # pnpm is pinned to 11.13.1 via the root package.json "packageManager"
  # field, which requires Node >=22.13 — Netlify's corepack-fetched pnpm
  # fails to even start (ERR_UNKNOWN_BUILTIN_MODULE: node:sqlite) on Node 20.
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Prisma's WASM query compiler (engineType = "client") is loaded via a
# computed runtime path, same as the old native binary was — Netlify's
# function bundler's static-import analysis doesn't always pick it up
# (it happened to for the admin app's route set, not for this one's).
# Force-include it explicitly rather than rely on that being consistent.
[functions]
  included_files = ["../../packages/db/generated/client/*.wasm"]
