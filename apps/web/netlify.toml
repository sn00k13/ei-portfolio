[build]
  base = "apps/web"
  publish = ".next"
  command = "pnpm --filter @eui/db run generate && pnpm --filter @eui/web run build"

[build.environment]
  # pnpm is pinned to 11.13.1 via the root package.json "packageManager"
  # field, which requires Node >=22.13 — Netlify's corepack-fetched pnpm
  # fails to even start (ERR_UNKNOWN_BUILTIN_MODULE: node:sqlite) on Node 20.
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Netlify's function bundler does its own static-import analysis to decide
# what ships with each Lambda — it does NOT use Next's own file-tracing
# output (outputFileTracingIncludes in next.config.ts has no effect here).
# Prisma's query-engine binary is loaded via a computed runtime path, so
# that analysis always misses it. This is Netlify's documented escape
# hatch: force-include it regardless of what any bundler's analysis finds.
[functions]
  included_files = ["../../packages/db/generated/client/*.node"]
